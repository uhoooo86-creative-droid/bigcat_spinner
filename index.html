<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIG CAT Game Activity Spinner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nanum+Gothic:wght@700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #D62020;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Fredoka One', 'Nanum Gothic', cursive;
    overflow-x: hidden;
    padding: 20px;
  }

  .header {
    text-align: center;
    margin-bottom: 24px;
  }

  .header h1 {
    font-size: 2.8rem;
    color: #FFE600;
    text-shadow: 3px 3px 0 #8B0000, -1px -1px 0 #8B0000;
    letter-spacing: 2px;
  }

  .header p {
    color: white;
    font-size: 1rem;
    margin-top: 4px;
    opacity: 0.9;
  }

  .spinner-container {
    background: #FFF5D6;
    border-radius: 28px;
    border: 5px solid #FFE600;
    box-shadow: 0 8px 0 #8B0000, 0 12px 30px rgba(0,0,0,0.4);
    padding: 28px 24px;
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* Slot machine display */
  .slot-display {
    background: #1a1a2e;
    border-radius: 16px;
    border: 4px solid #FFE600;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
  }

  .slot-number {
    font-size: 5rem;
    color: #FFE600;
    text-shadow: 0 0 20px #FFE600, 0 0 40px #FF9900;
    transition: transform 0.08s;
    position: relative;
    z-index: 2;
  }

  .slot-display::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 40% 40%, rgba(255,255,255,0.08), transparent 60%);
    z-index: 1;
  }

  /* Spin button */
  .spin-btn {
    background: linear-gradient(180deg, #FF6B00, #E03500);
    border: none;
    border-radius: 50%;
    width: 80px;
    height: 80px;
    cursor: pointer;
    font-size: 2.4rem;
    box-shadow: 0 6px 0 #8B1A00, 0 8px 20px rgba(0,0,0,0.3);
    transition: transform 0.1s, box-shadow 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #8B1A00; }
  .spin-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #8B1A00; }
  .spin-btn.spinning { animation: btnPulse 0.1s infinite alternate; }

  @keyframes btnPulse {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
  }

  /* Game card */
  .game-card {
    width: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .game-card.show { display: flex; }

  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.7) translateY(30px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .game-poster {
    width: 100%;
    max-width: 320px;
    border-radius: 20px;
    border: 4px solid #FFE600;
    box-shadow: 0 6px 0 #8B0000, 0 10px 30px rgba(0,0,0,0.3);
    object-fit: cover;
  }

  .game-title-badge {
    background: linear-gradient(180deg, #FFB800, #FF8C00);
    border-radius: 40px;
    padding: 10px 28px;
    border: 3px solid #8B4500;
    box-shadow: 0 4px 0 #8B4500;
  }

  .game-title-badge span {
    font-size: 1.6rem;
    color: white;
    text-shadow: 2px 2px 0 #8B4500;
    letter-spacing: 1px;
  }

  .game-desc {
    background: white;
    border-radius: 16px;
    border: 3px solid #FFE600;
    padding: 16px 20px;
    font-family: 'Nanum Gothic', sans-serif;
    font-size: 0.95rem;
    line-height: 1.7;
    color: #333;
    text-align: center;
    width: 100%;
    box-shadow: 0 3px 0 #ccc;
  }

  .again-btn {
    background: linear-gradient(180deg, #22C55E, #16A34A);
    border: none;
    border-radius: 40px;
    padding: 12px 32px;
    cursor: pointer;
    font-family: 'Fredoka One', cursive;
    font-size: 1.1rem;
    color: white;
    text-shadow: 1px 1px 0 #14532D;
    box-shadow: 0 5px 0 #14532D;
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 1px;
  }

  .again-btn:hover { transform: translateY(-2px); box-shadow: 0 7px 0 #14532D; }
  .again-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #14532D; }

  /* number chips in corner */
  .num-badge {
    background: #D62020;
    color: #FFE600;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: bold;
    border: 2px solid #FFE600;
    align-self: flex-start;
  }

  .confetti {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<canvas class="confetti" id="confetti"></canvas>

<div class="header">
  <h1>🎮 BIG CAT</h1>
  <p>Game Activity Spinner</p>
</div>

<div class="spinner-container">
  <div class="slot-display">
    <div class="slot-number" id="slotNum">?</div>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spin()">▶</button>

  <div class="game-card" id="gameCard">
    <img class="game-poster" id="gamePoster" src="" alt="">
    <div class="game-title-badge"><span id="gameTitle"></span></div>
    <div class="game-desc" id="gameDesc"></div>
    <button class="again-btn" onclick="reset()">🎲 다시 뽑기!</button>
  </div>
</div>

let isSpinning = false;

function spin() {
  if (isSpinning) return;
  isSpinning = true;

  const btn = document.getElementById('spinBtn');
  const slot = document.getElementById('slotNum');
  const card = document.getElementById('gameCard');

  btn.classList.add('spinning');
  btn.textContent = '⏸';
  card.classList.remove('show');

  let count = 0;
  const totalTicks = 30 + Math.floor(Math.random() * 20);
  const chosen = Math.floor(Math.random() * 10) + 1;

  const tick = setInterval(() => {
    count++;
    // Rapid random numbers, then slow down to chosen
    if (count < totalTicks - 5) {
      slot.textContent = Math.floor(Math.random() * 10) + 1;
      slot.style.transform = 'scale(1.1)';
      setTimeout(() => slot.style.transform = 'scale(1)', 40);
    } else {
      slot.textContent = chosen;
      slot.style.color = '#FFE600';
    }

    if (count >= totalTicks) {
      clearInterval(tick);
      showGame(chosen);
      btn.classList.remove('spinning');
      btn.textContent = '▶';
      isSpinning = false;
    }
  }, 80);
}

function showGame(num) {
  const game = GAMES.find(g => g.num === num);
  if (!game) return;

  document.getElementById('gamePoster').src = game.img;
  document.getElementById('gameTitle').textContent = game.name;
  document.getElementById('gameDesc').textContent = game.desc;

  const card = document.getElementById('gameCard');
  card.classList.add('show');

  launchConfetti();
}

function reset() {
  const card = document.getElementById('gameCard');
  card.classList.remove('show');
  document.getElementById('slotNum').textContent = '?';
  document.getElementById('slotNum').style.color = '#FFE600';
}

// Simple confetti
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const pieces = Array.from({length: 80}, () => ({
    x: Math.random() * canvas.width,
    y: -10,
    r: Math.random() * 8 + 4,
    color: ['#FFE600','#FF4444','#44FF88','#4488FF','#FF88FF'][Math.floor(Math.random()*5)],
    vx: (Math.random()-0.5)*4,
    vy: Math.random()*4+2,
    rot: Math.random()*360,
    rspd: (Math.random()-0.5)*8
  }));

  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI/180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.rot += p.rspd; p.vy += 0.05;
    });
    frame++;
    if (frame < 120) requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}
